<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteBox Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
<body>
    <header>
        <nav>
                <!----Logo-->
                <div id="logo">
                     <img src="images/logo1.png">
                </div>
                >
               
                <!---MenuItems-->
                <ul>
                    <li><a href="index.html" class="active">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="bitedeals.html">BiteDeals</a></li>
                    <li><a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></i></a></li>
                    <li><a href="login.html"><i class="fa-solid fa-arrow-right-to-bracket"></i>Login</a></li>

                </ul>
        </nav>
    </header>
    <!---authentication center-->
    <section class="auth-container">
        <div class="auth-box">
            <h2>Login to <span style="color: red;">Bite</span>Box</h2>
            <form action="">
                <input type="email" placeholder="Enter Email" id="email" required>
                <div style="position: relative;">
                    <input type="password" placeholder="password" id="password" required>
                    <span id="eye" onclick="togglePassword()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">
                        
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>
                
                <button type="button" onclick="login()">Login</button>
            </form>
            <p id="error" style="color: red;"></p>
            <p><a href="signup.html">Forgot Password</a></p>
            <p>Don't have an accouint?<a href="signup.html">SignUp</a></p>
        </div>
        
    </section> 
    <footer>

    </footer>
    <script src="javascript/script.js"></script>
</body>
</html>
